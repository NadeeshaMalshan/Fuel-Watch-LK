<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuelAlert | Sri Lanka Fuel Availability Tracker</title>
  <meta name="description"
    content="Real-time fuel station monitoring for Sri Lanka. Check Petrol and Diesel availability, update status, and find the nearest station with FuelAlert (Fuel Alert)." />

    content="Fuel Alert, Sri Lanka Fuel, Fuel Tracker, QR Fuel, Petrol Status, Diesel Status, Fuel Availability, FuelAlert, FuelWatch LK, Ceypetco, IOC" />

  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="canonical" href="https://fuelalert.online/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fuelalert.online/" />
  <meta property="og:title" content="FuelAlert | Sri Lanka Fuel Availability Tracker" />
  <meta property="og:description"
    content="Real-time fuel station monitoring for Sri Lanka. Check Petrol and Diesel availability at your nearest station." />
  <meta property="og:image" content="https://fuelalert.online/favicon.svg" />

  <meta property="og:image:height" content="512" />
  <meta property="og:site_name" content="FuelAlert" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:url" content="https://fuelalert.online/" />
  <meta name="twitter:title" content="FuelAlert | Sri Lanka Fuel Availability Tracker" />
  <meta name="twitter:description"
    content="Real-time fuel station monitoring for Sri Lanka. Check Petrol and Diesel availability at your nearest station." />
  <meta name="twitter:image" content="https://fuelalert.online/favicon.svg" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Fuel Alert",
      "url": "https://fuelalert.online",
      "description": "Community-powered real-time fuel availability and queue tracker for Sri Lanka.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "LKR"
      },
      "inLanguage": ["en", "si", "ta"],
      "areaServed": {
        "@type": "Country",
        "name": "Sri Lanka"
      }
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <div id="google_translate_element" style="display:none"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,si,ta',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script type="module" src="/src/main.tsx"></script>
