<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Fuel pump body -->
  <rect x="12" y="18" width="24" height="30" rx="3" fill="white"/>

  <!-- Pump screen / display -->
  <rect x="16" y="22" width="16" height="10" rx="2" fill="#93c5fd"/>

  <!-- Pump nozzle holder -->
  <rect x="36" y="24" width="4" height="16" rx="2" fill="white"/>

  <!-- Nozzle hose curve -->
  <path d="M36 32 Q44 32 44 24 L48 24" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Nozzle tip -->
  <rect x="46" y="20" width="8" height="5" rx="2" fill="#fbbf24"/>

  <!-- Fuel type label bar -->
  <rect x="16" y="36" width="16" height="6" rx="2" fill="#1d4ed8"/>

  <!-- Pump base -->
